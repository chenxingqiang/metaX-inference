name: test

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install torch (CPU)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run unit tests
        run: PYTHONPATH=. python -m unittest discover -s tests -v

      - name: Syntax check scripts
        run: python -m py_compile scripts/bench_qwen36.py scripts/check_mtp_head.py scripts/parse_bench_results.py scripts/profile_decode.py
