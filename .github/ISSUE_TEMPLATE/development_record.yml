name: 功能开发记录
description: 记录功能设计、接口问题、优化与难点（大赛评审用）
title: "[Dev] "
labels: ["development"]
body:
  - type: dropdown
    id: phase
    attributes:
      label: 阶段
      options:
        - 设计
        - 开发
        - 测试
        - 优化
        - 文档
    validations:
      required: true
  - type: textarea
    id: content
    attributes:
      label: 内容描述
      description: 功能设计、模型接口问题、优化项或技术难点
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 解决方案 / 产出
      description: 如何解决、对应文件或 commit
  - type: textarea
    id: data
    attributes:
      label: 性能数据（如有）
      description: tok/s、TTFT、显存等
