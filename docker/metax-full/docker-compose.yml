# MetaX 完整栈：vLLM (Qwen3.6-27B-AWQ) + TrustClaw Gateway
#
# 在仓库根目录执行:
#   ./scripts/build_metax_full_image.sh
#   cd docker/metax-full && cp app.env.example app.env && docker compose up -d
services:
  vllm:
    image: metax-vllm:local
    build:
      context: ../..
      dockerfile: docker/metax-full/Dockerfile.vllm
    pull_policy: never
    env_file:
      - path: app.env
        required: false
    environment:
      MODEL: ${MODEL:-/data/models/Qwen3.6-27B-AWQ}
      VLLM_API_KEY: ${VLLM_API_KEY:-}
      HOST: 0.0.0.0
      PORT: 8000
      MACA_PATH: /opt/maca
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
    volumes:
      - ${MODELS_DIR:-/data/models}:/data/models:ro
      - ${CONDA_DIR:-/opt/conda}:/opt/conda:ro
      - ${MACA_DIR:-/opt/maca}:/opt/maca:ro
      - ${MXDRIVER_DIR:-/opt/mxdriver}:/opt/mxdriver:ro
    ports:
      - "${VLLM_PORT:-8000}:8000"
    restart: unless-stopped
    init: true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -sf http://127.0.0.1:8000/v1/models -H "Authorization: Bearer $${VLLM_API_KEY}" || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s

  trustclaw:
    image: metax-trustclaw:local
    build:
      context: ../..
      dockerfile: docker/metax-full/Dockerfile.trustclaw
      args:
        OPENCLAW_IMAGE: metax-openclaw:local
    pull_policy: never
    depends_on:
      vllm:
        condition: service_healthy
    env_file:
      - path: app.env
        required: false
    environment:
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_DISABLE_BONJOUR: "1"
      OPENCLAW_GATEWAY_PORT: "19001"
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      VLLM_API_KEY: ${VLLM_API_KEY:-}
      VLLM_BASE_URL: http://vllm:8000/v1
      VLLM_MODEL_ID: ${VLLM_MODEL_ID:-/data/models/Qwen3.6-27B-AWQ}
      OPENCLAW_PRIMARY_MODEL: ${OPENCLAW_PRIMARY_MODEL:-vllm//data/models/Qwen3.6-27B-AWQ}
      TRUSTCLAW_DEFAULT_AGENT_PACK: ${TRUSTCLAW_DEFAULT_AGENT_PACK:-glp1-eligibility}
      APP_PORT: ${APP_PORT:-19001}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - trustclaw-data:/home/node/.openclaw
    ports:
      - "${APP_PORT:-19001}:19001"
    restart: unless-stopped
    init: true
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:19001/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  trustclaw-data:
