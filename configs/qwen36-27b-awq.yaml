# Qwen3.6-27B-AWQ on MetaX C500 (32GB) — Phase 1 vLLM tuning (AGENT.md §12)

model:
  id: QuantTrio/Qwen3.6-27B-AWQ
  local_dir: /data/models/Qwen3.6-27B-AWQ
  max_model_len: 8192
  trust_remote_code: true

hardware:
  gpu: MetaX C500
  vram_gb: 32
  tensor_parallel_size: 1

vllm_serve:
  host: 0.0.0.0
  port: 8000
  dtype: auto
  gpu_memory_utilization: 0.92
  max_num_batched_tokens: 8192
  max_num_seqs: 64
  enable_chunked_prefill: true
  enable_prefix_caching: true

benchmark:
  prompt: "你好，请用一句话介绍你自己。"
  max_tokens: 128
  temperature: 0.7
  concurrent_requests: [1, 4, 8]

kernels:
  hidden_size: 5120
  num_heads: 40
  num_kv_heads: 8
  head_dim: 128
  rope_theta: 1000000
